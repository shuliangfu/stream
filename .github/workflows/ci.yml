# CI: 三端跨平台测试（Deno / Bun / Node.js 22+），验证跨运行时兼容性
# 注意：CI 仅跑单元测试（18 文件）：tests/adapters/、tests/server/、tests/utils/、tests/manager.test.ts。
#       排除 tests/integration/（需真实流媒体服务器 + test.mp4，gitignored）和
#       tests/client/browser-client.test.ts（需 Playwright 浏览器）。
#       适配器测试用 mock fetch，无需真实 SRS/LiveKit/FFmpeg/Nginx-RTMP 服务。
# 注意：Deno 解析依赖图时需 --minimum-dependency-age=0 绕过 JSR 最小依赖日期约束。
name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# 工作流级 env：让基于 Node 的 GitHub Actions（如 checkout、setup-*）提前使用 Node 24 运行时，
# 便于在官方强制升级前做性能/稳定性验证。参见 GitHub 文档中的 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Deno（Linux / macOS / Windows）
  # ─────────────────────────────────────────────────────────────────────────
  test-deno:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9

      - name: Cache dependencies
        continue-on-error: true
        run: deno cache --minimum-dependency-age=0 src/mod.ts src/client/mod.ts

      - name: Check
        run: deno check src/mod.ts src/client/mod.ts

      - name: Lint
        run: deno lint src/

      - name: Test (Deno)
        run: deno test -A --minimum-dependency-age=0 --no-check tests/ --ignore=tests/integration,tests/client/browser-client.test.ts

  # ─────────────────────────────────────────────────────────────────────────
  # Bun（Linux / macOS / Windows）
  # ─────────────────────────────────────────────────────────────────────────
  test-bun:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test (Bun)
        run: bun test tests/adapters/ tests/server/ tests/utils/ tests/manager.test.ts

  # ─────────────────────────────────────────────────────────────────────────
  # Node.js 22（Linux / macOS / Windows）
  # ─────────────────────────────────────────────────────────────────────────
  test-node:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Test (Node)
        run: npm run test:node
